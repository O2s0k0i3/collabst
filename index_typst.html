<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <script type="module"
        src="https://cdn.jsdelivr.net/npm/@myriaddreamin/typst.ts/dist/esm/contrib/all-in-one-lite.bundle.js"
        id="typst"></script>
</head>

<body>
    <textarea id="typst-input" style="width:100%;height:200px"></textarea>
    <div id="typst-output"></div>

    <script>
        document.getElementById('typst').addEventListener('load', function () {
            $typst.setCompilerInitOptions({
                getModule: () =>
                    "https://cdn.jsdelivr.net/npm/@myriaddreamin/typst-ts-web-compiler/pkg/typst_ts_web_compiler_bg.wasm",
            });

            $typst.setRendererInitOptions({
                getModule: () =>
                    "https://cdn.jsdelivr.net/npm/@myriaddreamin/typst-ts-renderer/pkg/typst_ts_renderer_bg.wasm",
            });

            const input = document.getElementById("typst-input");
            input.value = `= Hello typst\nThis is a *test*.`;

            const out = document.getElementById("typst-output");

            async function update() {
                try {
                    out.innerHTML = await $typst.svg({ mainContent: input.value });
                } catch (e) {
                    out.textContent = e.toString();
                }
            }

            input.addEventListener("input", update);
            update();
        });
    </script>
</body>

</html>
