<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #typst-input {
            width: 100%;
            height: 200px;
            font-family: monospace;
            font-size: 14px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        #typst-output {
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 10px;
            min-height: 200px;
        }
        #diagnostics {
            font-family: monospace;
            font-size: 13px;
            padding: 10px;
            border-radius: 4px;
            white-space: pre-wrap;
        }
        #diagnostics.error {
            background: #fee;
            border: 1px solid #f99;
            color: #c00;
        }
        #diagnostics.warning {
            background: #ffe;
            border: 1px solid #cc0;
            color: #880;
        }
        #diagnostics.success {
            background: #efe;
            border: 1px solid #9c9;
            color: #080;
        }
        #diagnostics:empty {
            display: none;
        }
        .diag-item {
            margin-bottom: 8px;
            padding: 5px;
            border-radius: 3px;
        }
        .diag-error {
            background: #fdd;
        }
        .diag-warning {
            background: #ffd;
        }
    </style>
    <script type="module"
        src="https://cdn.jsdelivr.net/npm/@myriaddreamin/typst.ts/dist/esm/contrib/all-in-one-lite.bundle.js"
        id="typst"></script>
</head>

<body>
    <div contenteditable="true">truc<span style="color: #ff0000;">blabla</span>truc</div>
    <textarea id="typst-input"></textarea>
    <div id="diagnostics"></div>
    <div id="typst-output"></div>

    <script>
        document.getElementById('typst').addEventListener('load', async function () {
            $typst.setCompilerInitOptions({
                getModule: () =>
                    "https://cdn.jsdelivr.net/npm/@myriaddreamin/typst-ts-web-compiler/pkg/typst_ts_web_compiler_bg.wasm",
            });

            $typst.setRendererInitOptions({
                getModule: () =>
                    "https://cdn.jsdelivr.net/npm/@myriaddreamin/typst-ts-renderer/pkg/typst_ts_renderer_bg.wasm",
            });

            const input = document.getElementById("typst-input");
            const out = document.getElementById("typst-output");
            const diagDiv = document.getElementById("diagnostics");

            input.value = `= Hello typst
This is a *test*.

#let x = 1 + "string" // This will cause an error
`;

            function formatDiagnostics(diagnostics) {
                if (!diagnostics || diagnostics.length === 0) {
                    return { html: '', hasError: false, hasWarning: false };
                }

                let hasError = false;
                let hasWarning = false;
                let html = '';

                for (const diag of diagnostics) {
                    const isError = diag.severity === 'error' || diag.severity === 'Error';
                    if (isError) hasError = true;
                    else hasWarning = true;

                    const className = isError ? 'diag-error' : 'diag-warning';
                    const icon = isError ? '❌' : '⚠️';

                    let location = '';
                    if (diag.range) {
                        location = ` at ${diag.range}`;
                    }
                    if (diag.path) {
                        location = ` in ${diag.path}${location}`;
                    }

                    html += `<div class="diag-item ${className}">${icon} <strong>${diag.severity}</strong>${location}: ${diag.message}</div>`;
                }

                return { html, hasError, hasWarning };
            }

            async function update() {
                const mainContent = input.value;
                diagDiv.innerHTML = '';
                diagDiv.className = '';

                try {
                    // Get the compiler and compile with diagnostics
                    const compiler = await $typst.getCompiler();
                    
                    // Add source and compile
                    compiler.addSource('/main.typ', mainContent);
                    const result = await compiler.compile({
                        mainFilePath: '/main.typ',
                        diagnostics: 'full'
                    });

                    // Handle diagnostics
                    if (result.diagnostics && result.diagnostics.length > 0) {
                        const { html, hasError, hasWarning } = formatDiagnostics(result.diagnostics);
                        diagDiv.innerHTML = html;
                        diagDiv.className = hasError ? 'error' : (hasWarning ? 'warning' : 'success');
                    } else {
                        diagDiv.innerHTML = '✅ No errors or warnings';
                        diagDiv.className = 'success';
                    }

                    // Render the output if compilation succeeded
                    if (result.result) {
                        const renderer = await $typst.getRenderer();
                        const svg = await renderer.runWithSession(async (session) => {
                            renderer.manipulateData({
                                renderSession: session,
                                action: 'reset',
                                data: result.result,
                            });
                            return renderer.renderSvg({ renderSession: session });
                        });
                        out.innerHTML = svg;
                    } else {
                        out.innerHTML = '<p style="color: #999;">Compilation failed - see diagnostics above</p>';
                    }

                } catch (e) {
                    diagDiv.innerHTML = `<div class="diag-item diag-error">❌ <strong>Error</strong>: ${e.message || e}</div>`;
                    diagDiv.className = 'error';
                    out.innerHTML = '';
                }
            }

            input.addEventListener("input", update);
            update();
        });
    </script>
</body>

</html>
